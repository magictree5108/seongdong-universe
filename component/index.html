<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden;
  font-family: 'JetBrains Mono', monospace; background: transparent; }
#stage { position: relative; width: 100%; height: 100vh;
  background:
    radial-gradient(1px 1px at 12% 22%, rgba(255,255,255,0.5) 0, transparent 60%),
    radial-gradient(1px 1px at 78% 8%, rgba(255,255,255,0.35) 0, transparent 60%),
    radial-gradient(1.5px 1.5px at 42% 65%, rgba(180,200,255,0.45) 0, transparent 60%),
    radial-gradient(1px 1px at 90% 45%, rgba(255,255,255,0.3) 0, transparent 60%),
    radial-gradient(1px 1px at 25% 85%, rgba(255,255,255,0.35) 0, transparent 60%),
    linear-gradient(180deg, #05060d 0%, #070a16 55%, #05060d 100%);
}
#gl { position: absolute; inset: 0; width: 100% !important; height: 100% !important; }
#wires { position: absolute; inset: 0; pointer-events: none; }

.hdr { position: absolute; top: 18px; left: 24px; z-index: 30; pointer-events: none; }
.hdr .title { font-size: 1.9rem; font-weight: 700; letter-spacing: 0.22em;
  color: #eaf1ff; text-shadow: 0 0 22px rgba(120,170,255,0.6); }
.hdr .sub { color: #7d8bb0; font-size: 0.72rem; letter-spacing: 0.1em; margin-top: 4px; }
.hdr .contact { color: #6ee7a8; font-size: 0.72rem; letter-spacing: 0.06em;
  margin-top: 6px; opacity: 0.9; }

#resetBtn { position: absolute; top: 22px; right: 24px; z-index: 40;
  background: rgba(12,17,32,0.85); color: #6ee7a8;
  border: 1px solid rgba(110,231,168,0.55); border-radius: 5px;
  font-family: inherit; font-size: 0.85rem; font-weight: 700;
  letter-spacing: 0.12em; padding: 9px 20px; cursor: pointer;
  box-shadow: 0 0 16px rgba(110,231,168,0.15); }
#resetBtn:hover { background: rgba(110,231,168,0.15); box-shadow: 0 0 22px rgba(110,231,168,0.4); }

#searchWrap { position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%); z-index: 30; width: min(620px, 82%);
  transition: opacity 0.5s ease, visibility 0s linear 0.5s; text-align: center; }
#searchWrap.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
#q { width: 100%; background: rgba(8,12,24,0.82);
  border: 1px solid rgba(120,170,255,0.55); color: #eaf1ff;
  font-family: inherit; font-size: 1.05rem; letter-spacing: 0.03em;
  border-radius: 6px; padding: 15px 20px; outline: none;
  box-shadow: 0 0 30px rgba(80,130,255,0.25), 0 0 90px rgba(80,130,255,0.12);
  text-align: center; }
#q:focus { border-color: #4fd8ff; box-shadow: 0 0 34px rgba(79,216,255,0.5); }
#q::placeholder { color: #5c6890; }

/* 모드 안내 — 밝은 성단 위에서도 확실히 읽히도록 불투명에 가까운 다크 패널 */
#modeHint { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
.mode { display: flex; align-items: center; gap: 9px; text-align: left;
  background: rgba(3,5,12,0.97); backdrop-filter: blur(4px);
  border: 1px solid rgba(140,165,255,0.4);
  border-radius: 6px; padding: 8px 13px; font-size: 0.76rem; color: #aab5da;
  line-height: 1.45; transition: border-color 0.25s, color 0.25s, box-shadow 0.25s; }
.mode b { color: #e2e8ff; font-weight: 700; }
.mode .ico { font-size: 0.85rem; }
#modeSearch.active { background: rgba(6,16,28,0.97);
  border-color: rgba(79,216,255,0.9); color: #cfe3ff;
  box-shadow: 0 0 20px rgba(79,216,255,0.35); }
#modeSearch.active b { color: #4fd8ff; }
#modeAsk.active { background: rgba(24,18,4,0.97);
  border-color: rgba(255,226,138,0.95); color: #ffe9c2;
  box-shadow: 0 0 20px rgba(255,209,102,0.4); }
#modeAsk.active b { color: #ffe28a; }

#searchHint { color: #94a1c6; font-size: 0.7rem; letter-spacing: 0.08em;
  margin-top: 10px; text-shadow: 0 0 6px rgba(0,0,0,0.95), 0 0 12px rgba(0,0,0,0.9);
  background: rgba(6,9,18,0.6); display: inline-block; border-radius: 10px;
  padding: 3px 12px; }
#noMatch { color: #ffb4a2; font-size: 0.8rem; margin-top: 12px; display: none;
  background: rgba(6,9,18,0.8); border-radius: 6px; padding: 6px 12px; }

#loading { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
  z-index: 35; color: #4fd8ff; font-size: 0.9rem; letter-spacing: 0.3em;
  display: none; animation: pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 0.35; } 50% { opacity: 1; } }

.card { position: absolute; width: 330px; z-index: 20;
  border: 1px solid rgba(120,150,255,0.4); border-radius: 7px;
  background: linear-gradient(180deg, rgba(16,20,36,0.92), rgba(10,13,24,0.92));
  padding: 11px 14px; opacity: 0.8; transition: opacity 0.18s ease;
  box-shadow: 0 0 14px rgba(60,90,200,0.18); cursor: default; }
.card:hover { opacity: 1.0; z-index: 25;
  border-color: rgba(79,216,255,0.8); box-shadow: 0 0 24px rgba(79,216,255,0.35); }
.card .rank { color: #4fd8ff; font-weight: 700; font-size: 0.72rem; }
.card .pill { display: inline-block; font-size: 0.62rem; padding: 1px 7px;
  border-radius: 9px; margin-left: 6px; border: 1px solid currentColor; }
.card .t { color: #eaf1ff; font-weight: 700; font-size: 0.82rem; margin: 4px 0 3px;
  line-height: 1.35; }
.card .m { color: #8291b8; font-size: 0.65rem; margin-bottom: 4px; }
.card .s { color: #b9c4e0; font-size: 0.7rem; line-height: 1.5; max-height: 66px;
  overflow: hidden; }
.card a { color: #4fd8ff; font-size: 0.66rem; text-decoration: none; }
.card a:hover { text-decoration: underline; }

#tip { position: absolute; z-index: 45; width: 260px; pointer-events: none;
  border: 1px solid rgba(79,216,255,0.55); border-radius: 6px;
  background: rgba(10,14,26,0.94); padding: 9px 12px; display: none;
  box-shadow: 0 0 18px rgba(79,216,255,0.25); }
#tip .t { color: #eaf1ff; font-weight: 700; font-size: 0.76rem; line-height: 1.35; }
#tip .m { color: #8291b8; font-size: 0.64rem; margin-top: 3px; }
#tip .h { color: #4fd8ff; font-size: 0.62rem; margin-top: 5px; }
#tipsvg { position: absolute; inset: 0; pointer-events: none; z-index: 44; }

#detail { position: absolute; top: 70px; right: 24px; z-index: 50; width: 380px;
  border: 1px solid rgba(79,216,255,0.6); border-radius: 8px;
  background: linear-gradient(180deg, rgba(14,18,34,0.97), rgba(8,11,22,0.97));
  padding: 16px 18px; display: none;
  box-shadow: 0 0 30px rgba(79,216,255,0.3); }
#detail .pill { display: inline-block; font-size: 0.66rem; padding: 1px 8px;
  border-radius: 10px; border: 1px solid currentColor; }
#detail .t { color: #eaf1ff; font-weight: 700; font-size: 0.95rem;
  margin: 7px 0 4px; line-height: 1.4; }
#detail .m { color: #8291b8; font-size: 0.7rem; margin-bottom: 8px; }
#detail .s { color: #b9c4e0; font-size: 0.78rem; line-height: 1.6; }
#detail a.go { display: inline-block; margin-top: 10px; color: #4fd8ff;
  font-size: 0.76rem; text-decoration: none; border: 1px solid rgba(79,216,255,0.5);
  border-radius: 4px; padding: 5px 12px; }
#detail a.go:hover { background: rgba(79,216,255,0.12); }
#detail .close { position: absolute; top: 8px; right: 10px; cursor: pointer;
  color: #7d8bb0; background: none; border: none; font-family: inherit;
  font-size: 0.9rem; }
#detail .close:hover { color: #eaf1ff; }
#detail .nbrs { margin-top: 10px; border-top: 1px solid rgba(120,150,255,0.25);
  padding-top: 8px; max-height: 190px; overflow-y: auto; }
#detail .nbrs .nh { color: #7d8bb0; font-size: 0.64rem; letter-spacing: 0.08em;
  margin-bottom: 5px; }
#detail .nbr { display: block; width: 100%; text-align: left; cursor: pointer;
  background: rgba(20,26,46,0.6); border: 1px solid rgba(120,150,255,0.25);
  border-radius: 5px; color: #b9c4e0; font-family: inherit; font-size: 0.7rem;
  padding: 5px 9px; margin-bottom: 4px; line-height: 1.4; }
#detail .nbr:hover { border-color: rgba(255,209,102,0.8); color: #eaf1ff;
  background: rgba(255,209,102,0.08); }
#detail .nbr .pill { font-size: 0.58rem; margin-right: 6px; margin-left: 0; }

#scrollHint { position: absolute; left: 50%; top: 80%;
  transform: translateX(-50%); z-index: 40; color: #05060d;
  font-size: 1.0rem; font-weight: 700; letter-spacing: 0.1em; display: none;
  background: linear-gradient(90deg, #4fd8ff, #6ee7a8);
  border-radius: 24px; padding: 11px 26px; cursor: pointer; border: none;
  font-family: inherit;
  animation: bob 1.6s ease-in-out infinite;
  box-shadow: 0 0 26px rgba(79,216,255,0.55), 0 0 60px rgba(79,216,255,0.25); }
#scrollHint:hover { box-shadow: 0 0 36px rgba(79,216,255,0.85); }
@keyframes bob { 0%,100% { transform: translate(-50%, 0); }
  50% { transform: translate(-50%, 7px); } }

#meta { position: absolute; left: 24px; bottom: 18px; z-index: 20; max-width: 46%;
  color: #7d8bb0; font-size: 0.68rem; line-height: 1.7; opacity: 0.85; }
#meta .laws a { color: #ffd166; text-decoration: none; }
#meta .laws a:hover { text-decoration: underline; }
#legend { position: absolute; right: 24px; bottom: 18px; z-index: 20;
  color: #7d8bb0; font-size: 0.66rem; line-height: 1.7; text-align: right; opacity: 0.8; }
#legend b { font-weight: 400; }
</style>
</head>
<body>
<div id="stage">
  <canvas id="gl"></canvas>
  <svg id="wires"></svg>
  <div class="hdr">
    <div class="title" id="appTitle">성동 UNIVERSE</div>
    <div class="sub" id="appSub"></div>
    <div class="contact">문의 및 피드백: 010-8829-5108(정호원)</div>
  </div>
  <button id="resetBtn" title="검색을 초기화하고 전체 우주로 돌아갑니다">⟲ 초기화</button>
  <div id="searchWrap">
    <input id="q" placeholder="검색하거나 질문하세요 — 예: 재개발 · 마을버스 예산 얼마야?" autocomplete="off">
    <div id="modeHint">
      <div class="mode" id="modeSearch"><span class="ico">🔍</span>
        <span><b>키워드 검색</b> — 관련 문서·사업을 우주에서 찾아 비춰줍니다
        (예: 재개발 · 민간위탁)</span></div>
      <div class="mode" id="modeAsk"><span class="ico">◆</span>
        <span><b>질문하기</b> — 사업·예산·조례·부서를 서로 연결해 근거와 함께
        AI가 답합니다, 약 20~30초 (예: 마을버스 예산 얼마야?)<br>
        <span style="color:#9aa7cc;">문장 끝에 <b style="color:#ffe28a;">?</b>를 붙이면
        항상 질문하기로 실행됩니다.</span></span></div>
    </div>
    <div id="searchHint">Enter 실행 · 드래그 회전 · 휠 확대/축소</div>
    <div id="noMatch">NO MATCH — 관련 자료가 확인되지 않았습니다. 다른 키워드로 시도해보세요.</div>
  </div>
  <div id="loading">AI 선별 중 ···</div>
  <svg id="tipsvg"></svg>
  <div id="tip"></div>
  <div id="detail">
    <button class="close" title="닫기">✕ 닫기</button>
    <div id="detailBody"></div>
  </div>
  <button id="scrollHint">▼ 상세 결과·법령 보러 내려가기 ▼</button>
  <div id="meta"></div>
  <div id="legend"></div>
</div>
<script src="./three.min.js"></script>
<script>
"use strict";
/* ── Streamlit 컴포넌트 프로토콜 (라이브러리 없이 postMessage 직접 구현) ── */
function stSend(type, data) {
  window.parent.postMessage(Object.assign({ isStreamlitMessage: true, type: type }, data), "*");
}
function stSetValue(v) { stSend("streamlit:setComponentValue", { value: v, dataType: "json" }); }

let scene, camera, renderer, docPoints, entPoints, polPoints, edgeLines, ontoLines, hiPoints;
let N = 0, basePos = null, drawPos = null, phase = null, vis = null;
let state = { mode: "idle", cards: [], centroid: [0,0,0], spread: 0 };
let camDist = 26, camTargetDist = 26, camFocus = new THREE.Vector3(0,0,0),
    camTargetFocus = new THREE.Vector3(0,0,0);
let rotY = 0, userTheta = 0.6, userPhi = 1.15, dragging = false, lastX = 0, lastY = 0;
let nodesRef = null, cardEls = [], nonce = 0, initialized = false, dataSig = "";
let ontoAdj = {}, lastAnswerQuery = "";
let hoverId = -1, downX = 0, downY = 0, moved = false;
const raycaster = new THREE.Raycaster();
raycaster.params.Points = { threshold: 0.22 };
const pointerNdc = new THREE.Vector2(-2, -2);

const CAT_COLOR = { consulting: 0xff9d45, notice: 0x4fd8ff, ordinance: 0xb18bff,
                    org: 0x2dd4bf, news: 0xf472b6, entity: 0x6ee7a8,
                    policy: 0xffe28a };
const CAT_SHORT = { consulting: "선례", notice: "공고", ordinance: "조례",
                    org: "부서", news: "소식", entity: "태그", policy: "사업" };

function spriteTexture(diamond) {
  const c = document.createElement("canvas"); c.width = c.height = 64;
  const g = c.getContext("2d");
  g.translate(32, 32);
  if (diamond) g.rotate(Math.PI / 4);
  const grad = g.createRadialGradient(0, 0, 2, 0, 0, 26);
  grad.addColorStop(0, "rgba(255,255,255,1)");
  grad.addColorStop(0.35, "rgba(255,255,255,0.85)");
  grad.addColorStop(1, "rgba(255,255,255,0)");
  g.fillStyle = grad;
  if (diamond) g.fillRect(-18, -18, 36, 36); else { g.beginPath(); g.arc(0,0,26,0,7); g.fill(); }
  return new THREE.CanvasTexture(c);
}

function initScene() {
  const canvas = document.getElementById("gl");
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(55, 2, 0.1, 500);
  window.addEventListener("resize", resize);
  resize();

  const st = document.getElementById("stage");
  const UI_SEL = ".card,#searchWrap,#resetBtn,#detail,#tip,#meta,#legend,#scrollHint";
  st.addEventListener("pointerdown", e => {
    if (e.target.closest(UI_SEL)) return;
    dragging = true; moved = false;
    lastX = downX = e.clientX; lastY = downY = e.clientY;
  });
  window.addEventListener("pointerup", e => {
    const wasDragging = dragging; dragging = false;
    if (!wasDragging || moved || e.target.closest(UI_SEL)) return;
    if (hoverId >= 0) showDetail(hoverId);      // 클릭 → 상세 패널
  });
  window.addEventListener("pointermove", e => {
    const r = renderer.domElement.getBoundingClientRect();
    pointerNdc.set(((e.clientX - r.left) / r.width) * 2 - 1,
                   -((e.clientY - r.top) / r.height) * 2 + 1);
    if (e.target.closest(UI_SEL)) pointerNdc.set(-2, -2);   // UI 위에선 호버 끔
    if (!dragging) return;
    if (Math.abs(e.clientX - downX) + Math.abs(e.clientY - downY) > 5) moved = true;
    userTheta -= (e.clientX - lastX) * 0.005;
    userPhi = Math.max(0.15, Math.min(3.0, userPhi - (e.clientY - lastY) * 0.005));
    lastX = e.clientX; lastY = e.clientY;
  });
  document.querySelector("#detail .close").addEventListener("click", () => {
    document.getElementById("detail").style.display = "none";
  });
  // 상세 패널 피벗 칩 — 이벤트 위임 (innerHTML 재생성에도 유지)
  document.getElementById("detailBody").addEventListener("click", e => {
    const chip = e.target.closest(".nbr");
    if (chip) pivotTo(parseInt(chip.dataset.node, 10));
  });
  document.getElementById("scrollHint").addEventListener("click", () => scrollToBoard(0));
  st.addEventListener("wheel", e => {
    e.preventDefault();
    camTargetDist = Math.max(3, Math.min(60, camTargetDist * (e.deltaY > 0 ? 1.1 : 0.9)));
  }, { passive: false });

  // 질문형 감지 — app.py의 _QUESTION_RE와 반드시 동기화할 것
  const QUESTION_RE = /[?？]|얼마|무엇|뭐야|뭔가|어디|어느|누가|누구|몇 |몇%|왜 |어떻게|알려|추이|변화|변했|현황은|뭐 하|하나요|인가요|인지|되나|됐나|맞아/;
  const qInput = document.getElementById("q");
  qInput.addEventListener("input", () => {
    const v = qInput.value.trim();
    const isQ = QUESTION_RE.test(v);
    // 입력 중 감지된 모드에 불이 들어온다 (빈 입력이면 둘 다 중립)
    document.getElementById("modeSearch").classList.toggle("active", !!v && !isQ);
    document.getElementById("modeAsk").classList.toggle("active", !!v && isQ);
  });
  qInput.addEventListener("keydown", e => {
    if (e.key !== "Enter") return;
    const q = e.target.value.trim();
    if (!q) return;
    const isQ = QUESTION_RE.test(q);
    const loading = document.getElementById("loading");
    loading.textContent = isQ ? "근거 자료 연결해 답변 생성 중 ··· (약 20~30초)" : "AI 선별 중 ···";
    loading.style.display = "block";
    document.getElementById("noMatch").style.display = "none";
    document.getElementById("searchWrap").classList.add("hidden");
    stSetValue({ type: "search", query: q, nonce: Date.now() });
  });
  document.getElementById("resetBtn").addEventListener("click", () => {
    document.getElementById("q").value = "";
    stSetValue({ type: "reset", nonce: Date.now() });
  });
  requestAnimationFrame(tick);
}

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h; camera.updateProjectionMatrix();
  ["wires", "tipsvg"].forEach(id => {
    const svg = document.getElementById(id);
    svg.setAttribute("width", w); svg.setAttribute("height", h);
  });
}

/* ── 호버 툴팁 + 클릭 상세 ── */
function nodeInfoHtml(i, forDetail) {
  const nr = nodesRef;
  const cat = nr.cat[i], color = "#" + (CAT_COLOR[cat] || 0x8899ff)
      .toString(16).padStart(6, "0");
  const pill = `<span class="pill" style="color:${color};">${CAT_SHORT[cat] || ""}</span>`;
  if (!forDetail)
    return `${pill}<div class="t">${nr.title[i]}</div>` +
           `<div class="m">${nr.src[i]} · ${nr.date[i] || "날짜 미상"}</div>` +
           `<div class="h">클릭하면 상세정보</div>`;
  const link = nr.url[i]
    ? `<a class="go" href="${nr.url[i]}" target="_blank" rel="noopener noreferrer">원문 보기 ↗</a>`
    : `<div class="m" style="margin-top:8px;">원문 링크 없음</div>`;
  // 온톨로지 이웃 피벗 칩 — 클릭하면 그 노드로 카메라가 날아간다
  const nbrs = (ontoAdj[i] || []).filter(j => !vis || vis[j]);
  let nbrHtml = "";
  if (nbrs.length) {
    const chips = nbrs.slice(0, 8).map(j => {
      const jc = nodesRef.cat[j],
            jcol = "#" + (CAT_COLOR[jc] || 0x8899ff).toString(16).padStart(6, "0");
      return `<button class="nbr" data-node="${j}">` +
             `<span class="pill" style="color:${jcol};">${CAT_SHORT[jc] || ""}</span>` +
             `${nodesRef.title[j]}</button>`;
    }).join("");
    const more = nbrs.length > 8
      ? `<div class="nh" style="margin-top:2px;">…외 ${nbrs.length - 8}건</div>` : "";
    nbrHtml = `<div class="nbrs"><div class="nh">◆ 연결 (${nbrs.length}) — 클릭해서 이동</div>` +
              chips + more + `</div>`;
  }
  return `${pill}<div class="t">${nr.title[i]}</div>` +
         `<div class="m">${nr.src[i]} · ${nr.date[i] || "날짜 미상"}</div>` +
         `<div class="s">${nr.snip[i]}</div>${link}${nbrHtml}`;
}

function pivotTo(i) {
  camTargetFocus.set(basePos[i*3], basePos[i*3+1], basePos[i*3+2]);
  camTargetDist = Math.min(camTargetDist, 9);
  showDetail(i);
}

// 부모 문서의 상세 보드(#board)로 스크롤 — 같은 출처(iframe)라 직접 접근 가능.
// 보드가 아직 렌더 전이면 잠시 재시도한다 (컴포넌트가 보드보다 먼저 그려지므로).
function scrollToBoard(attempt) {
  try {
    const anchor = window.parent.document.getElementById("board");
    if (!anchor) {
      if (attempt < 8) setTimeout(() => scrollToBoard(attempt + 1), 350);
      return;
    }
    anchor.scrollIntoView({ behavior: "smooth", block: "start" });
    setTimeout(() => {   // smooth가 막히는 환경(탭 스로틀 등) 대비 즉시 이동 폴백
      if (anchor.getBoundingClientRect().top > 200)
        anchor.scrollIntoView({ behavior: "auto", block: "start" });
    }, 800);
  } catch (e) { /* 교차 출처 배포 환경이면 무시 */ }
}

function showDetail(i) {
  document.getElementById("detailBody").innerHTML = nodeInfoHtml(i, true);
  document.getElementById("detail").style.display = "block";
}

function updateHover() {
  if (!nodesRef || pointerNdc.x < -1.5 || dragging) { hideTip(); return; }
  raycaster.setFromCamera(pointerNdc, camera);
  const hits = raycaster.intersectObjects([docPoints, entPoints, polPoints].filter(Boolean));
  let id = -1;
  if (hits.length) {
    const h = hits[0];
    id = h.object.userData.idx[h.index];
    if (vis && !vis[id]) id = -1;
  }
  hoverId = id;
  const tip = document.getElementById("tip"),
        line = ensureTipLine();
  if (id < 0) { hideTip(); return; }
  tip.innerHTML = nodeInfoHtml(id, false);
  tip.style.display = "block";
  const w = window.innerWidth, h2 = window.innerHeight;
  const v = new THREE.Vector3(drawPos[id*3], drawPos[id*3+1], drawPos[id*3+2])
      .project(camera);
  const nx = (v.x * 0.5 + 0.5) * w, ny = (-v.y * 0.5 + 0.5) * h2;
  // 툴팁은 노드 오른쪽에, 화면 밖이면 왼쪽에
  let tx = nx + 26, ty = Math.max(10, Math.min(h2 - 130, ny - 30));
  if (tx + 270 > w) tx = nx - 290;
  tip.style.left = tx + "px"; tip.style.top = ty + "px";
  line.setAttribute("stroke", "rgba(79,216,255,0.7)");
  line.setAttribute("x1", tx + (tx > nx ? 0 : 260));
  line.setAttribute("y1", ty + 30);
  line.setAttribute("x2", nx); line.setAttribute("y2", ny);
  document.body.style.cursor = "pointer";
}

function ensureTipLine() {
  const svg = document.getElementById("tipsvg");
  let line = svg.querySelector("line");
  if (!line) {
    line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("stroke-width", "1.2");
    svg.appendChild(line);
  }
  return line;
}

function hideTip() {
  hoverId = -1;
  document.getElementById("tip").style.display = "none";
  const line = document.getElementById("tipsvg").querySelector("line");
  if (line) line.setAttribute("stroke", "transparent");
  document.body.style.cursor = "default";
}

function buildGeometry(nodes, edges) {
  N = nodes.x.length;
  basePos = new Float32Array(N * 3); drawPos = new Float32Array(N * 3);
  phase = new Float32Array(N); vis = nodes.vis;
  const docIdx = [], entIdx = [], polIdx = [];
  for (let i = 0; i < N; i++) {
    basePos[i*3] = nodes.x[i]; basePos[i*3+1] = nodes.y[i]; basePos[i*3+2] = nodes.z[i];
    phase[i] = (i * 2654435761 % 6283) / 1000.0;
    (nodes.kind[i] === 2 ? polIdx : nodes.kind[i] === 1 ? entIdx : docIdx).push(i);
  }
  [docPoints, entPoints, polPoints, edgeLines, ontoLines, hiPoints]
    .forEach(o => { if (o) scene.remove(o); });

  function makePoints(idx, diamond, size, opacity) {
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(idx.length * 3), col = new Float32Array(idx.length * 3);
    const c = new THREE.Color();
    idx.forEach((ni, k) => {
      c.setHex(CAT_COLOR[nodes.cat[ni]] || 0x8899ff);
      col[k*3] = c.r; col[k*3+1] = c.g; col[k*3+2] = c.b;
    });
    geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
    geo.setAttribute("color", new THREE.BufferAttribute(col, 3));
    // 위치가 매 프레임 바뀌므로 boundingSphere를 넉넉히 고정
    // (기본 자동 계산은 초기값(원점)으로 캐시되어 레이캐스트가 빗나간다)
    geo.boundingSphere = new THREE.Sphere(new THREE.Vector3(0, 0, 0), 40);
    const mat = new THREE.PointsMaterial({ size, map: spriteTexture(diamond),
      vertexColors: true, transparent: true, opacity, depthWrite: false,
      blending: THREE.AdditiveBlending, sizeAttenuation: true });
    const pts = new THREE.Points(geo, mat);
    pts.userData.idx = idx;
    scene.add(pts);
    return pts;
  }
  docPoints = makePoints(docIdx, false, 0.55, 0.6);
  entPoints = makePoints(entIdx, true, 1.5, 0.85);
  polPoints = makePoints(polIdx, true, 0.95, 0.9);   // 사업: 작은 골드 다이아몬드

  function makeLines(eds, color, opacity) {
    const geo = new THREE.BufferGeometry();
    geo.setAttribute("position",
      new THREE.BufferAttribute(new Float32Array(eds.length * 6), 3));
    const lines = new THREE.LineSegments(geo, new THREE.LineBasicMaterial({
      color, transparent: true, opacity }));
    lines.userData.edges = eds;
    scene.add(lines);
    return lines;
  }
  // 엣지 3번째 원소: 1 = 온톨로지 링크(담당·근거·언급) → 골드로 구분
  edgeLines = makeLines(edges.filter(e => !e[2]), 0x7896ff, 0.07);
  ontoLines = makeLines(edges.filter(e => e[2]), 0xffd166, 0.13);

  // 온톨로지 인접 리스트 — 상세 패널의 피벗 칩(연결 타고 이동)용
  ontoAdj = {};
  edges.forEach(e => {
    if (!e[2]) return;
    (ontoAdj[e[0]] = ontoAdj[e[0]] || []).push(e[1]);
    (ontoAdj[e[1]] = ontoAdj[e[1]] || []).push(e[0]);
  });

  const hgeo = new THREE.BufferGeometry();
  hgeo.setAttribute("position", new THREE.BufferAttribute(new Float32Array(60), 3));
  hgeo.setDrawRange(0, 0);
  hiPoints = new THREE.Points(hgeo, new THREE.PointsMaterial({ size: 2.6,
    map: spriteTexture(false), color: 0xfff3b0, transparent: true, opacity: 1.0,
    depthWrite: false, blending: THREE.AdditiveBlending, sizeAttenuation: true }));
  scene.add(hiPoints);
}

function applyStateVisuals() {
  const focus = state.mode === "results";
  if (docPoints) docPoints.material.opacity = focus ? 0.18 : 0.6;
  if (entPoints) entPoints.material.opacity = focus ? 0.25 : 0.85;
  if (polPoints) polPoints.material.opacity = focus ? 0.28 : 0.9;
  if (edgeLines) edgeLines.material.opacity = focus ? 0.03 : 0.07;
  if (ontoLines) ontoLines.material.opacity = focus ? 0.05 : 0.13;
  document.getElementById("searchWrap").classList.toggle("hidden", focus);
  document.getElementById("loading").style.display = "none";
  document.getElementById("noMatch").style.display =
    state.mode === "none" ? "block" : "none";
  if (state.mode === "none") {
    document.getElementById("searchWrap").classList.remove("hidden");
  }
  if (focus) {
    camTargetFocus.set(state.centroid[0], state.centroid[1], state.centroid[2]);
    // 거의 끝까지 축소 — 전체 우주 속에서 결과 연결망 전체가 보이게
    // (하이라이트·커넥터 라인이 위치를 알려주므로 확대는 사용자 휠에 맡긴다)
    camTargetDist = Math.max(26, Math.min(38, (state.spread || 2) * 2.2 + 12));
  } else {
    camTargetFocus.set(0, 0, 0);
    camTargetDist = 26;
  }
  document.getElementById("scrollHint").style.display = focus ? "block" : "none";
  document.getElementById("detail").style.display = "none";
  buildCards();
}

function buildCards() {
  cardEls.forEach(el => el.remove()); cardEls = [];
  const svg = document.getElementById("wires");
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  if (state.mode !== "results") return;
  const cards = state.cards.slice(0, 8);
  cards.forEach((cdata, k) => {
    const el = document.createElement("div");
    el.className = "card";
    const color = "#" + (CAT_COLOR[cdata.cat] || 0x8899ff).toString(16).padStart(6, "0");
    const link = cdata.url
      ? `<a href="${cdata.url}" target="_blank" rel="noopener noreferrer">원문 보기 ↗</a>`
      : `<span style="color:#4a5578;font-size:0.66rem;">원문 링크 없음</span>`;
    el.innerHTML =
      `<span class="rank">#${String(k + 1).padStart(2, "0")}</span>` +
      `<span class="pill" style="color:${color};">${CAT_SHORT[cdata.cat] || ""}</span>` +
      `<div class="t">${cdata.title}</div>` +
      `<div class="m">${cdata.source} · ${cdata.date || "날짜 미상"}</div>` +
      `<div class="s">${cdata.snippet}</div>` +
      `<div style="margin-top:5px;">${link}</div>`;
    document.getElementById("stage").appendChild(el);
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("stroke", "rgba(255,243,176,0.55)");
    line.setAttribute("stroke-width", "1.2");
    svg.appendChild(line);
    cardEls.push(el);
    el._line = line; el._node = cdata.node; el._slot = k;
  });
}

function layoutCards() {
  const w = window.innerWidth, h = window.innerHeight;
  const perSide = Math.ceil(cardEls.length / 2);
  const v = new THREE.Vector3();
  cardEls.forEach(el => {
    const k = el._slot, left = k % 2 === 0, row = Math.floor(k / 2);
    const rows = perSide;
    // 하단 메타·범례와 겹치지 않도록 카드 영역을 화면 위 2/3에 배치
    const usable = h - 330;
    const y = 96 + usable * (rows <= 1 ? 0.3 : row / Math.max(1, rows - 1));
    const x = left ? 24 : w - 354;
    el.style.left = x + "px"; el.style.top = y + "px";
    v.set(drawPos[el._node*3], drawPos[el._node*3+1], drawPos[el._node*3+2]).project(camera);
    if (v.z > 1) { el._line.setAttribute("stroke", "transparent"); return; }
    el._line.setAttribute("stroke", "rgba(255,243,176,0.55)");
    const nx = (v.x * 0.5 + 0.5) * w, ny = (-v.y * 0.5 + 0.5) * h;
    const rect = el.getBoundingClientRect();
    el._line.setAttribute("x1", left ? rect.right : rect.left);
    el._line.setAttribute("y1", rect.top + rect.height / 2);
    el._line.setAttribute("x2", nx); el._line.setAttribute("y2", ny);
  });
}

let tPrev = 0;
function tick(t) {
  requestAnimationFrame(tick);
  if (!renderer || !N) return;
  const dt = Math.min(0.05, (t - tPrev) / 1000 || 0.016); tPrev = t;
  rotY += dt * 0.05;                          // 상시 느린 자전
  const time = t / 1000;

  for (let i = 0; i < N; i++) {               // 노드별 미세 부유
    const hidden = vis && !vis[i];
    if (hidden) { drawPos[i*3] = drawPos[i*3+1] = drawPos[i*3+2] = 1e6; continue; }
    const p = phase[i];
    drawPos[i*3]   = basePos[i*3]   + Math.sin(time * 0.5 + p) * 0.09;
    drawPos[i*3+1] = basePos[i*3+1] + Math.sin(time * 0.35 + p * 1.7) * 0.09;
    drawPos[i*3+2] = basePos[i*3+2] + Math.cos(time * 0.42 + p) * 0.09;
  }
  [docPoints, entPoints, polPoints].forEach(pts => {
    const idx = pts.userData.idx, arr = pts.geometry.attributes.position.array;
    idx.forEach((ni, k) => {
      arr[k*3] = drawPos[ni*3]; arr[k*3+1] = drawPos[ni*3+1]; arr[k*3+2] = drawPos[ni*3+2];
    });
    pts.geometry.attributes.position.needsUpdate = true;
  });
  [edgeLines, ontoLines].forEach(lines => {
    const eArr = lines.geometry.attributes.position.array,
          eds = lines.userData.edges;
    for (let e = 0; e < eds.length; e++) {
      const a = eds[e][0], b = eds[e][1];
      eArr[e*6]   = drawPos[a*3]; eArr[e*6+1] = drawPos[a*3+1]; eArr[e*6+2] = drawPos[a*3+2];
      eArr[e*6+3] = drawPos[b*3]; eArr[e*6+4] = drawPos[b*3+1]; eArr[e*6+5] = drawPos[b*3+2];
    }
    lines.geometry.attributes.position.needsUpdate = true;
  });

  if (state.mode === "results") {             // 결과 노드 하이라이트
    const hArr = hiPoints.geometry.attributes.position.array;
    const cards = state.cards.slice(0, Math.min(20, state.cards.length));
    cards.forEach((c, k) => {
      hArr[k*3] = drawPos[c.node*3]; hArr[k*3+1] = drawPos[c.node*3+1];
      hArr[k*3+2] = drawPos[c.node*3+2];
    });
    hiPoints.geometry.setDrawRange(0, cards.length);
    hiPoints.geometry.attributes.position.needsUpdate = true;
  } else hiPoints.geometry.setDrawRange(0, 0);

  camDist += (camTargetDist - camDist) * Math.min(1, dt * 2.5);
  camFocus.lerp(camTargetFocus, Math.min(1, dt * 2.5));
  const th = userTheta + rotY, ph = userPhi;
  camera.position.set(
    camFocus.x + camDist * Math.sin(ph) * Math.cos(th),
    camFocus.y + camDist * Math.cos(ph),
    camFocus.z + camDist * Math.sin(ph) * Math.sin(th));
  camera.lookAt(camFocus);
  renderer.render(scene, camera);
  layoutCards();
  updateHover();
}

/* ── 렌더 이벤트 수신 ── */
window.addEventListener("message", ev => {
  const msg = ev.data;
  if (!msg || msg.type !== "streamlit:render") return;
  const args = msg.args;
  if (!initialized) { initScene(); initialized = true; }
  nodesRef = args.nodes;
  if (args.data_sig !== dataSig) {
    dataSig = args.data_sig;
    buildGeometry(args.nodes, args.edges);
  } else if (args.nodes.vis) {
    vis = args.nodes.vis;
  }
  state = args.state;
  document.getElementById("appTitle").textContent = args.title || "성동 UNIVERSE";
  document.getElementById("appSub").textContent = args.subtitle || "";
  document.getElementById("meta").innerHTML = args.meta_html || "";
  document.getElementById("legend").innerHTML = args.legend_html || "";
  applyStateVisuals();

  // AI 답변(성공/실패)이 도착하면 스크롤 버튼 문구를 바꾸고 자동으로 보여준다 —
  // 답변이 화면 아래에 렌더되어 "답을 안 한 것처럼" 보이는 문제 방지.
  const hint = document.getElementById("scrollHint");
  if (args.answer_state && args.answer_query) {
    hint.textContent = args.answer_state === "ok"
      ? "▼ AI 답변 보러 내려가기 ▼" : "▼ 답변 생성 실패 — 사유 보기 ▼";
    if (args.answer_query !== lastAnswerQuery) {
      lastAnswerQuery = args.answer_query;
      scrollToBoard(0);
    }
  } else {
    hint.textContent = "▼ 상세 결과·법령 보러 내려가기 ▼";
    if (!args.answer_query) lastAnswerQuery = "";
  }
});
stSend("streamlit:componentReady", { apiVersion: 1 });
stSend("streamlit:setFrameHeight", { height: 860 });
</script>
</body>
</html>
